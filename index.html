<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAAC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 style="display: none;">PAAC</h1>

    <div class="input-field">
      <input type="text" placeholder="User input..." id="input">
      <input type="submit" value="Clear" class="submit" onclick="handleClear()">
      <input type="submit" value="Send" class="submit" onclick="handleSend()">
    </div>

    <div class="ai">
      <!-- ai-generated prompts -->
       <!-- TODO: make it actually take in prompts -->
      <button onclick="handleIconClick('AI-generated prompt')">
        AI-generated prompt
      </button>
      <button onclick="handleIconClick('AI-generated prompt')">
        AI-generated prompt
      </button>
      <button onclick="handleIconClick('AI-generated prompt')">
        AI-generated prompt
      </button>
      <button onclick="handleIconClick('AI-generated prompt')">
        AI-generated prompt
      </button>
    </div>
  </header>

  <main>
    
    <div class="board">
      <!-- contexts -->
      <!-- TODO: change so that more words pop up when you click on these -> handleContextClick -->
      <div class="contexts">
        <ul>
          <li>
            <button onclick="handleIconClick('Food')">
              <img src="assets/icon.png" width=35rem height=35rem>
              Food
            </button>
          </li>
          <li>
            <button onclick="handleIconClick('Family')">
              <img src="assets/icon.png" width=35rem height=35rem>
              Family
            </button>
          </li>
          <li>
            <button onclick="handleIconClick('School')">
              <img src="assets/icon.png" width=35rem height=35rem>
              School
            </button>
          </li>
          <li>
            <button onclick="handleIconClick('Health')">
              <img src="assets/icon.png" width=35rem height=35rem>
              Health
            </button>
          </li>
        </ul>
      </div>
    
      <!-- icons -->
      <div class="icons">
        <table>
          <thead>
            <tr>
              <th>Pronouns</th>
              <th>Verbs</th>
              <th>Adjectives</th>
              <th>Prepositions</th>
              <th>Questions</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- fanboy conjunctions -->
    <div class="fanboys">
      <ul class="fanboys-list"></ul>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
