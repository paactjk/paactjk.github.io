<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAAC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>PAAC</h1>
    <input type="text" placeholder="User input...">
    <!-- ai-generated prompts -->
  </header>

  <main>
    
    <div class="board">
      <!-- Contexts -->
      <div class="contexts">
        <h2>Contexts</h2>
        <ul>
          <li>
            <button>
              <img>
              Food
            </button>
          </li>
          <li>
            <button>
              <img>

            </button>

              Health
            </button>
          </li>
        </ul>
      </div>

      <div class="icons">
        <h2>Icons</h2>
        <table>
          <!-- header row -->
          <tr>
            <th>Pronouns</th>
            <th>Verbs</th>
            <th>Adjectives</th>
            <th>Prepositions</th>
            <th>Questions</th>
          </tr>
    
          <!-- first row -->
          <tr>

            </td>
            <td>
              <button>
                <img>
                Loud
              </button>
            </td>
            <td>
              <button>
                <img>
                On
              </button>
            </td>
            <td>
              <button>
                <img>
                Who
              </button>
            </td>
          </tr>
    
          <!-- third row -->

            <td>

                <img>
